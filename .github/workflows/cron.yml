name: NetKingdoms CRON

on:
  schedule:
    - cron: '*/15 * * * *'        # update-dominance every 15 min
    - cron: '0 0,6,12,18 * * *'   # take-snapshot 4×/day
    - cron: '0 3 * * *'           # cleanup-territories daily
    - cron: '0 0 * * 1'           # create-challenge every Monday
    - cron: '0 6 * * 1'           # manage-ephemeral every Monday
    - cron: '0 0 * * 1/2 * * *'   # season-reset every 14 days (Monday 00:00 UTC)
    - cron: '*/30 * * * *'        # detect-anomalies every 30 min
  workflow_dispatch:
    inputs:
      function:
        description: 'Function to run manually'
        required: false
        default: 'all'

env:
  SUPABASE_URL: https://hfqzsduezngpmxfplnfg.supabase.co

jobs:
  update-dominance:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call update-dominance
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/update-dominance" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  take-snapshot:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0,6,12,18 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call take-snapshot
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/take-snapshot" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  cleanup-territories:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup-territories
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/cleanup-territories" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  create-challenge:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Call create-challenge
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/create-challenge" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  manage-ephemeral:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Call manage-ephemeral
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/manage-ephemeral" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  season-reset:
    # Every 14 days — alternating Mondays at 00:00 UTC
    # Note: GitHub Actions doesn't support /2-week cron; handle via step condition
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1/2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Check if reset week
        id: check
        run: |
          # Week number mod 2 == 0 → reset week
          WEEK=$(date +%V)
          if (( WEEK % 2 == 0 )); then echo "should_reset=true" >> $GITHUB_OUTPUT; fi
      - name: Call season-reset
        if: steps.check.outputs.should_reset == 'true'
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/season-reset" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  detect-anomalies:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call detect-anomalies
        run: |
          curl -sf -X POST "$SUPABASE_URL/functions/v1/detect-anomalies" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .
